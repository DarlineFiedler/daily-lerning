name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write   # für den Coverage-Kommentar an der PR

jobs:
  # ---------------------------------------------------------------------------
  # Statische Analyse: SwiftLint (Stil-/Fehlerregeln) + SwiftFormat (Formatierung).
  # Läuft parallel zum Build und blockiert die PR bei Verstößen.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Format
    runs-on: macos-15
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint & SwiftFormat
        run: brew install swiftlint swiftformat

      - name: SwiftLint (strict – Warnungen zählen als Fehler)
        run: swiftlint lint --strict

      - name: SwiftFormat (nur prüfen, nicht ändern)
        run: swiftformat . --lint

  # ---------------------------------------------------------------------------
  # Build + Unit-Tests inkl. Code-Coverage-Gate.
  # Compiler-Warnungen werden als Fehler behandelt.
  # ---------------------------------------------------------------------------
  test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Select iOS Simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c '
          import json, sys
          data = json.load(sys.stdin)["devices"]
          candidates = [
              dev["udid"]
              for runtime in sorted(data)
              for dev in data[runtime]
              if "iPhone" in dev["name"] and dev.get("isAvailable", False)
          ]
          if not candidates:
              sys.exit("No available iPhone simulator found")
          print(candidates[-1])
          ')
          echo "Using simulator $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Build & run unit tests (mit Coverage, Warnings = Errors)
        run: |
          xcodebuild test \
            -project DailyHangul.xcodeproj \
            -scheme DailyHangul \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -enableCodeCoverage YES \
            -resultBundlePath "build/Test.xcresult" \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES \
            GCC_TREAT_WARNINGS_AS_ERRORS=YES

      - name: Coverage-Gate (Logik-Schicht ≥ Schwelle)
        id: coverage
        run: |
          set -o pipefail
          scripts/check-coverage.sh build/Test.xcresult "${COVERAGE_THRESHOLD:-75}" | tee coverage-report.txt
        env:
          # Schwelle zentral hier anpassbar (Prozent Line-Coverage der Logik-Schicht).
          # Startwert 75 (Ist ~76%); beim Ausbau der Tests Richtung 80 anheben.
          COVERAGE_THRESHOLD: "75"

      - name: Coverage in Job-Summary schreiben
        if: always() && hashFiles('coverage-report.txt') != ''
        run: |
          {
            echo '### 📊 Code-Coverage (Logik-Schicht)'
            echo '```'
            cat coverage-report.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Coverage als PR-Kommentar posten/aktualisieren
        if: always() && github.event_name == 'pull_request' && hashFiles('coverage-report.txt') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('coverage-report.txt', 'utf8');
            const marker = '<!-- coverage-report -->';
            const body = `${marker}\n### 📊 Code-Coverage (Logik-Schicht)\n\`\`\`\n${report}\n\`\`\``;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
