name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Standard: nur Lesezugriff. Der Schreibzugriff für den Coverage-Kommentar wird
# gezielt nur dem Job gewährt, der ihn braucht (siehe Job "test").
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Statische Analyse: SwiftLint (Stil-/Fehlerregeln) + SwiftFormat (Formatierung).
  # Läuft parallel zum Build und blockiert die PR bei Verstößen.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Format
    runs-on: macos-15
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Versionen bewusst GEPINNT (nicht "brew install ... latest") → reproduzierbare
      # CI. Ein neues SwiftLint/SwiftFormat-Release, das --strict verschärft, kann so
      # nicht überraschend eine grüne main rot machen; Upgrades erfolgen als bewusster
      # PR (hier die Versionsnummern anheben).
      - name: Install pinned SwiftLint & SwiftFormat
        env:
          SWIFTLINT_VERSION: "0.65.0"
          SWIFTFORMAT_VERSION: "0.62.1"
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/tools"
          curl -fsSL -o "$RUNNER_TEMP/swiftlint.zip" \
            "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/portable_swiftlint.zip"
          curl -fsSL -o "$RUNNER_TEMP/swiftformat.zip" \
            "https://github.com/nicklockwood/SwiftFormat/releases/download/${SWIFTFORMAT_VERSION}/swiftformat.zip"
          unzip -o -q "$RUNNER_TEMP/swiftlint.zip" swiftlint -d "$RUNNER_TEMP/tools"
          unzip -o -q "$RUNNER_TEMP/swiftformat.zip" swiftformat -d "$RUNNER_TEMP/tools"
          chmod +x "$RUNNER_TEMP/tools/swiftlint" "$RUNNER_TEMP/tools/swiftformat"
          echo "$RUNNER_TEMP/tools" >> "$GITHUB_PATH"

      - name: Tool-Versionen protokollieren
        run: |
          swiftlint version
          swiftformat --version

      - name: SwiftLint (strict – Warnungen zählen als Fehler)
        run: swiftlint lint --strict

      - name: SwiftFormat (nur prüfen, nicht ändern)
        run: swiftformat . --lint

  # ---------------------------------------------------------------------------
  # Build + Unit-Tests inkl. Code-Coverage-Gate.
  # Compiler-Warnungen werden als Fehler behandelt.
  # ---------------------------------------------------------------------------
  test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 30
    # Nur dieser Job braucht Schreibrechte – für den Coverage-PR-Kommentar.
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Select iOS Simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c '
          import json, sys
          data = json.load(sys.stdin)["devices"]
          candidates = [
              dev["udid"]
              for runtime in sorted(data)
              for dev in data[runtime]
              if "iPhone" in dev["name"] and dev.get("isAvailable", False)
          ]
          if not candidates:
              sys.exit("No available iPhone simulator found")
          print(candidates[-1])
          ')
          echo "Using simulator $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Build & run unit tests (mit Coverage, Warnings = Errors)
        run: |
          xcodebuild test \
            -project DailyHangul.xcodeproj \
            -scheme DailyHangul \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -enableCodeCoverage YES \
            -resultBundlePath "build/Test.xcresult" \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES

      - name: Coverage-Gate (Logik-Schicht ≥ Schwelle)
        id: coverage
        run: |
          set -o pipefail
          scripts/check-coverage.sh build/Test.xcresult "${COVERAGE_THRESHOLD:-75}" | tee coverage-report.txt
        env:
          # Schwelle zentral hier anpassbar (Prozent Line-Coverage der Logik-Schicht).
          # Startwert 75 (Ist ~76%); beim Ausbau der Tests Richtung 80 anheben.
          COVERAGE_THRESHOLD: "75"

      - name: Coverage in Job-Summary schreiben
        if: always() && hashFiles('coverage-report.txt') != ''
        run: |
          {
            echo '### 📊 Code-Coverage (Logik-Schicht)'
            echo '```'
            cat coverage-report.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Coverage als PR-Kommentar posten/aktualisieren
        if: always() && github.event_name == 'pull_request' && hashFiles('coverage-report.txt') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('coverage-report.txt', 'utf8');
            const marker = '<!-- coverage-report -->';
            const body = `${marker}\n### 📊 Code-Coverage (Logik-Schicht)\n\`\`\`\n${report}\n\`\`\``;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
