name: DailyHangul
options:
  bundleIdPrefix: com.darlinefiedler
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: en

settings:
  base:
    MARKETING_VERSION: "2.4.1"
    CURRENT_PROJECT_VERSION: "24"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  DailyHangul:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Shared
      - path: WordPacks
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.darlinefiedler.DailyHangul
        PRODUCT_NAME: DailyHangul
        CODE_SIGN_ENTITLEMENTS: App/DailyHangul.entitlements
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: DailyHangul
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations:
          - en
          - de
          - ko
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleURLName: com.darlinefiedler.DailyHangul
            CFBundleURLSchemes:
              - dailyhangul
    dependencies:
      - target: DailyHangulWidgetExtension

  DailyHangulWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Widget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.darlinefiedler.DailyHangul.Widget
        PRODUCT_NAME: DailyHangulWidget
        CODE_SIGN_ENTITLEMENTS: Widget/DailyHangulWidget.entitlements
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: DailyHangul
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  DailyHangulTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.darlinefiedler.DailyHangul.Tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: DailyHangul

  DailyHangulUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.darlinefiedler.DailyHangul.UITests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: DailyHangul

# Explizites Schema, damit die CI (`xcodebuild test -scheme DailyHangul`) verlässlich
# BEIDE Test-Bundles ausführt – Unit- UND UI-Tests. Nicht der Auto-Scheme-Generierung
# überlassen, sonst könnte der UI-Smoke-Test unbemerkt nie laufen.
schemes:
  DailyHangul:
    build:
      targets:
        DailyHangul: all
    test:
      gatherCoverageData: true
      coverageTargets:
        - DailyHangul
        - DailyHangulWidgetExtension
      targets:
        - DailyHangulTests
        - DailyHangulUITests
